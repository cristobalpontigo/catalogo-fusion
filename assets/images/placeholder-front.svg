<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#004a8f"/>
      <stop offset="50%" stop-color="#0076ce"/>
      <stop offset="100%" stop-color="#005fa3"/>
    </linearGradient>
    <linearGradient id="swoosh" x1="0" y1="0" x2="400" y2="450">
      <stop offset="0%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#0076ce"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="8"/>
  <path d="M0 0 L280 0 Q200 225 0 450 Z" fill="url(#swoosh)" opacity="0.6"/>
  <text x="40" y="80" fill="white" font-family="Arial,sans-serif" font-size="48" font-weight="bold">Fusion</text>
  <text x="40" y="120" fill="white" font-family="Arial,sans-serif" font-size="14" opacity="0.8">WAYNE FUELING SYSTEMS</text>
  <!-- USB -->
  <rect x="320" y="160" width="30" height="14" fill="#222" rx="2"/>
