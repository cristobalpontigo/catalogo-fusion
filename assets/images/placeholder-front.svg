  <!-- LEDs -->
  <circle cx="580" cy="170" r="6" fill="#4ade80"/>
  <text x="565" y="195" fill="white" font-size="9" opacity="0.7">POWER</text>
  <circle cx="580" cy="210" r="6" fill="#666"/>
  <text x="568" y="235" fill="white" font-size="9" opacity="0.7">GRIBS</text>
  <!-- PWR -->
  <rect x="650" y="160" width="40" height="40" fill="#166534" rx="4" stroke="#4ade80"/>
  <text x="658" y="215" fill="white" font-size="10" opacity="0.7">PWR</text>
  <text x="400" y="420" fill="white" font-size="14" opacity="0.4" text-anchor="middle">Vista Frontal  Coloca front.jpg aqu�</text>
