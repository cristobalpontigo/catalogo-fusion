<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="450">
      <stop offset="0%" stop-color="#004a8f"/>
      <stop offset="100%" stop-color="#0076ce"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)" rx="8"/>
  <!-- COM1-4 -->
  <rect x="30" y="60" width="40" height="24" fill="#333" rx="2" stroke="#555"/>
  <rect x="30" y="95" width="40" height="24" fill="#333" rx="2" stroke="#555"/>
  <text x="25" y="140" fill="white" font-size="9" opacity="0.7">COM1</text>
  <text x="25" y="155" fill="white" font-size="9" opacity="0.7">COM2</text>
  <rect x="90" y="40" width="40" height="24" fill="#333" rx="2" stroke="#555"/>
  <rect x="140" y="40" width="40" height="24" fill="#333" rx="2" stroke="#555"/>
  <text x="95" y="78" fill="white" font-size="9" opacity="0.7">COM3</text>
  <text x="145" y="78" fill="white" font-size="9" opacity="0.7">COM4</text>
  <!-- VGA / DP -->
  <rect x="220" y="80" width="50" height="30" fill="#1e40af" rx="3"/>
  <text x="232" y="125" fill="white" font-size="9" opacity="0.7">VGA</text>
  <rect x="220" y="140" width="50" height="20" fill="#333" rx="2"/>
  <text x="235" y="175" fill="white" font-size="9" opacity="0.7">DP</text>
  <!-- LAN1/USB LAN2/USB -->
  <rect x="310" y="50" width="36" height="28" fill="#222" rx="2"/>
  <rect x="310" y="85" width="20" height="10" fill="#333" rx="1"/>
  <rect x="335" y="85" width="20" height="10" fill="#333" rx="1"/>
  <text x="305" y="115" fill="white" font-size="8" opacity="0.7">LAN1/USB</text>
  <rect x="380" y="50" width="36" height="28" fill="#222" rx="2"/>
  <rect x="380" y="85" width="20" height="10" fill="#333" rx="1"/>
  <rect x="405" y="85" width="20" height="10" fill="#333" rx="1"/>
  <text x="375" y="115" fill="white" font-size="8" opacity="0.7">LAN2/USB</text>
  <!-- GPIO -->
  <rect x="470" y="45" width="30" height="16" fill="#166534" rx="2"/>
  <text x="468" y="75" fill="white" font-size="8" opacity="0.7">GPIO</text>
  <!-- Audio -->
  <circle cx="520" cy="90" r="8" fill="#1e40af"/>
  <circle cx="550" cy="90" r="8" fill="#166534"/>
  <text x="505" y="115" fill="white" font-size="8" opacity="0.7">LINE IN/OUT</text>
  <!-- GRIB terminals -->
  <rect x="620" y="50" width="150" height="120" fill="#111" rx="4" stroke="#444"/>
  <text x="635" y="75" fill="white" font-size="10" opacity="0.8">GRIB 3 / 5 / 6</text>
  <line x1="635" y1="90" x2="755" y2="90" stroke="#555"/>
  <line x1="635" y1="110" x2="755" y2="110" stroke="#555"/>
  <line x1="635" y1="130" x2="755" y2="130" stroke="#555"/>
  <!-- Antenna -->
  <text x="680" y="200" fill="white" font-size="9" opacity="0.7">ANTENNA</text>
  <text x="400" y="420" fill="white" font-size="14" opacity="0.4" text-anchor="middle">Vista Trasera  Coloca back.jpg aqu�</text>
</svg>
